<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Waffle - Gelişmiş Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-20">

    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Baby Waffle</h1>
            <p class="text-sm text-gray-400 text-center mb-6">Yönetici Girişi</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Yönetici Şifresi</label>
                    <input type="password" id="admin-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition">
                </div>
                <p id="login-error" class="text-red-500 text-xs hidden text-center font-medium">Hatalı şifre girdiniz!</p>
                <button onclick="checkPassword()" class="w-full bg-black text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition shadow-lg">Giriş Yap</button>
            </div>
        </div>
    </div>

    <div id="panel-screen" class="hidden max-w-5xl mx-auto px-4 py-10">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Baby Waffle Menü Yönetimi</h1>
                <p class="text-sm text-gray-500 mt-1" id="total-count">Yükleniyor...</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="openModal('category-modal')" class="flex-1 md:flex-none bg-gray-200 text-gray-800 font-bold px-5 py-3 rounded-xl text-sm hover:bg-gray-300 transition">Kategori Oluştur</button>
                <button onclick="openModal('product-modal')" class="flex-1 md:flex-none bg-black text-white font-bold px-5 py-3 rounded-xl text-sm hover:bg-gray-800 transition shadow-md">+ Yeni Ürün Ekle</button>
                <button onclick="logout()" class="bg-red-50 text-red-600 font-bold px-4 py-3 rounded-xl text-sm hover:bg-red-100 transition">Çıkış</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-400 uppercase tracking-wider">
                            <th class="p-4 pl-6">Görsel</th>
                            <th class="p-4">Ürün Adı</th>
                            <th class="p-4">Kategori</th>
                            <th class="p-4">Fiyat</th>
                            <th class="p-4 pr-6 text-right">İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="admin-menu-list" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="category-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <h3 class="text-xl font-bold text-gray-900 mb-4">Yeni Kategori Oluştur</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Kategori Adı</label>
                    <input type="text" id="new-cat-name" placeholder="Örn: ÇİKOLATALI WAFFLE" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-black">
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button onclick="closeModal('category-modal')" class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">İptal</button>
                    <button onclick="saveCategory()" class="bg-black text-white text-sm font-bold px-5 py-2 rounded-xl hover:bg-gray-800">Kategoriyi Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <div id="product-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-bold text-gray-900 mb-4">Yeni Ürün Ekle</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Ürün Adı *</label>
                    <input type="text" id="p-name" placeholder="Örn: Klasik Waffle" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-black">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Kategori Seçimi *</label>
                    <select id="p-category" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-black bg-white">
                        </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Fiyat (TL) *</label>
                    <input type="number" id="p-price" placeholder="Örn: 150" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-black">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">İçindekiler (Virgülle ayırın)</label>
                    <input type="text" id="p-ingredients" placeholder="Örn: Çilek, Muz, Sütlü Çikolata" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-black">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Ürün Görseli (Galeri/Dosya) *</label>
                    <input type="file" id="p-file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-black hover:file:bg-gray-200 cursor-pointer">
                </div>
                <div class="flex justify-end gap-2 pt-4 border-t border-gray-100">
                    <button onclick="closeModal('product-modal')" class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">İptal</button>
                    <button id="submit-product-btn" onclick="saveProduct()" class="bg-black text-white text-sm font-bold px-5 py-2 rounded-xl hover:bg-gray-800 flex items-center gap-2">
                        <span>Ürünü Kaydet</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CANLI BAĞLANTI BİLGİLERİ
        const SUPABASE_URL = 'https://zgdmnhjlxizkyecdfmuv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnZG1uaGpseGl6a3llY2RmbXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjUyMzcsImV4cCI6MjA5NzMwMTIzN30.L-KV8VKywt9fOF5jLDQFYOCX2kCEDrtXHRZFEBk2ARk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } });

        const CORRECT_PASSWORD_HASH = "babywaffle1453"; 
        let categoriesList = [];

        function checkPassword() {
            const input = document.getElementById('admin-password').value;
            if (input === CORRECT_PASSWORD_HASH) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('panel-screen').classList.remove('hidden');
                fetchAdminMenu();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function fetchAdminMenu() {
            try {
                const { data, error } = await supabaseClient.from('menu_items').select('*').order('id', { ascending: false });
                if (error) throw error;

                const tbody = document.getElementById('admin-menu-list');
                document.getElementById('total-count').innerText = `Toplam ${data.length} adet kayıtlı ürün bulunuyor.`;
                tbody.innerHTML = '';

                // Mevcut kategorileri dinamik olarak ayrıştırıp listeliyoruz
                const uniqueCats = [...new Set(data.map(item => item.category))];
                categoriesList = uniqueCats;
                updateCategorySelects();

                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50/50 transition" id="row-${item.id}">
                            <td class="p-4 pl-6">
                                <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover bg-gray-100" onerror="this.src='https://placehold.co/50x50?text=Yok'">
                            </td>
                            <td class="p-4 font-semibold text-gray-800">${item.name}</td>
                            <td class="p-4"><span class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-md text-xs font-medium">${item.category}</span></td>
                            <td class="p-4 font-bold text-gray-900">${item.price} ₺</td>
                            <td class="p-4 pr-6 text-right space-x-2">
                                <button onclick="updatePrice(${item.id}, '${item.name}', ${item.price})" class="text-xs font-bold text-gray-700 border border-gray-200 bg-white hover:bg-black hover:text-white px-3 py-1.5 rounded-lg transition">Fiyat Değiştir</button>
                                <button onclick="deleteProduct(${item.id}, '${item.name}')" class="text-xs font-bold text-red-600 border border-red-100 bg-red-50 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg transition">Sil</button>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                console.error(err);
                alert("Veriler yüklenirken hata oluştu.");
            }
        }

        function updateCategorySelects() {
            const select = document.getElementById('p-category');
            select.innerHTML = '';
            categoriesList.forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // YENİ KATEGORİ EKLEME
        function saveCategory() {
            const name = document.getElementById('new-cat-name').value.trim().toUpperCase();
            if(!name) return alert("Kategori adı boş olamaz!");
            if(categoriesList.includes(name)) return alert("Bu kategori zaten mevcut!");
            
            categoriesList.push(name);
            updateCategorySelects();
            document.getElementById('p-category').value = name; // Seçili yap
            document.getElementById('new-cat-name').value = '';
            closeModal('category-modal');
            alert(`"${name}" kategorisi eklendi! Ürünü eklediğinizde kalıcı hale gelecektir.`);
        }

        // OTOMATİK DOSYA YÜKLEME VE YENİ ÜRÜN KAYDETME
        async function saveProduct() {
            const name = document.getElementById('p-name').value.trim();
            const category = document.getElementById('p-category').value;
            const price = parseInt(document.getElementById('p-price').value);
            const ingredientsInput = document.getElementById('p-ingredients').value;
            const fileInput = document.getElementById('p-file');

            if(!name || !category || isNaN(price) || fileInput.files.length === 0) {
                return alert("Lütfen yıldızlı (*) zorunlu alanları ve görseli doldurun!");
            }

            const btn = document.getElementById('submit-product-btn');
            btn.disabled = true;
            btn.innerText = "Görsel Yükleniyor...";

            try {
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
                const filePath = `${fileName}`;

                // 1. Resmi Supabase Storage'a otomatik yüklüyoruz
                const { data: uploadData, error: uploadError } = await supabaseClient
                    .storage
                    .from('menu-images')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                // 2. Yüklenen resmin dışarıya açık linkini alıyoruz
                const { data: urlData } = supabaseClient
                    .storage
                    .from('menu-images')
                    .getPublicUrl(filePath);

                const publicImageUrl = urlData.publicUrl;

                // İçindekiler metnini diziye çevir
                const ingredients = ingredientsInput ? ingredientsInput.split(',').map(i => i.trim()).filter(i => i !== "") : [];

                // 3. Tabloya yeni satır ekliyoruz
                const { error: insertError } = await supabaseClient
                    .from('menu_items')
                    .insert([{ name, category, price, img: publicImageUrl, ingredients }]);

                if (insertError) throw insertError;

                alert("Ürün başarıyla eklendi!");
                
                // Formu temizle ve kapat
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-ingredients').value = '';
                fileInput.value = '';
                closeModal('product-modal');
                fetchAdminMenu();

            } catch (err) {
                console.error(err);
                alert("Ürün eklenirken bir hata oluştu: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Ürünü Kaydet";
            }
        }

        // FİYAT GÜNCELLEME
        async function updatePrice(id, name, currentPrice) {
            const newPrice = prompt(`"${name}" için yeni fiyatı girin:`, currentPrice);
            if (newPrice === null) return;
            const parsed = parseInt(newPrice);
            if (isNaN(parsed) || parsed <= 0) return alert("Geçersiz fiyat!");

            try {
                const { error } = await supabaseClient.from('menu_items').update({ price: parsed }).eq('id', id);
                if (error) throw error;
                fetchAdminMenu();
            } catch (err) {
                alert("Fiyat güncellenemedi.");
            }
        }

        // ÜRÜN KALDIRMA (SİLME)
        async function deleteProduct(id, name) {
            if(!confirm(`"${name}" ürününü menüden tamamen kaldırmak istediğinize emin misiniz?`)) return;

            try {
                const { error } = await supabaseClient.from('menu_items').delete().eq('id', id);
                if (error) throw error;
                alert("Ürün kaldırıldı.");
                fetchAdminMenu();
            } catch (err) {
                alert("Ürün silinirken bir hata oluştu.");
            }
        }

        function logout() {
            document.getElementById('admin-password').value = '';
            document.getElementById('panel-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
