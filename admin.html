<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Waffle - Yönetim Paneli</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Inter"', 'sans-serif'] },
                    colors: { gold: '#D4AF37', dark: '#1A1A1A' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-dark font-sans antialiased">

    <div id="login-screen" class="fixed inset-0 bg-dark z-50 flex items-center justify-center px-4">
        <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl space-y-6">
            <div class="text-center">
                <h1 class="text-2xl font-bold tracking-tight">Baby Waffle</h1>
                <p class="text-sm text-gray-400 mt-1">Yönetim Paneli Girişi</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Yönetici Şifresi</label>
                    <input type="password" id="admin-password" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-dark transition" placeholder="••••••••">
                </div>
                <button onclick="checkLogin()" class="w-full bg-dark text-white p-3 rounded-xl font-medium hover:bg-black transition">Giriş Yap</button>
                <p id="login-error" class="text-xs text-red-500 text-center hidden">Hatalı şifre girdiniz!</p>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden min-h-screen flex flex-col pb-20">
        <header class="bg-white border-b border-gray-100 sticky top-0 z-10 px-6 py-4 flex justify-between items-center shadow-sm">
            <div>
                <h1 class="text-xl font-bold">Baby Waffle Yönetim</h1>
                <p class="text-xs text-gray-400">Canlı Menü Yönetim Sistemi</p>
            </div>
            <button onclick="openProductModal()" class="bg-dark text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-black transition">
                <i data-feather="plus" class="w-4 h-4"></i> Yeni Ürün Ekle
            </button>
        </header>

        <div class="px-6 py-4 bg-white border-b border-gray-100 flex gap-2 overflow-x-auto hide-scroll" id="category-filters">
            </div>

        <main class="flex-1 p-6 max-w-4xl w-full mx-auto">
            <div id="loading-state" class="text-center py-12 text-gray-400">Ürünler yükleniyor...</div>
            <div id="products-table" class="space-y-3 hidden">
                </div>
        </main>
    </div>

    <div id="product-modal" class="fixed inset-0 bg-black/50 z-40 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden animate-fade-in">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 id="modal-mode-title" class="font-bold text-lg">Yeni Ürün Ekle</h3>
                <button onclick="closeProductModal()" class="p-1 rounded-full hover:bg-gray-100"><i data-feather="x" class="w-5 h-5"></i></button>
            </div>
            
            <form id="product-form" onsubmit="saveProduct(event)" class="p-6 space-y-4 overflow-y-auto">
                <input type="hidden" id="product-id">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Kategori</label>
                        <select id="prod-category" class="w-full p-3 border border-gray-200 rounded-xl bg-white focus:outline-none focus:border-dark" required>
                            <option value="WAFFLE 🧇">WAFFLE 🧇</option>
                            <option value="CUP WAFFLE 🧇">CUP WAFFLE 🧇</option>
                            <option value="TOST 🥪">TOST 🥪</option>
                            <option value="SICAK ☕">SICAK ☕</option>
                            <option value="SOĞUK 🍹">SOĞUK 🍹</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Ürün Adı</label>
                        <input type="text" id="prod-name" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-dark" placeholder="Örn: Baby Classic" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Fiyat (TL)</label>
                        <input type="number" id="prod-price" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-dark" placeholder="310" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Görsel URL (Imgur vb.)</label>
                        <input type="url" id="prod-img" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-dark" placeholder="https://i.imgur.com/...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">İçindekiler (Virgülle Ayırın)</label>
                    <p class="text-[11px] text-gray-400 mb-2">Waffle dışındaki ürünlerde boş bırakabilirsiniz.</p>
                    <textarea id="prod-ingredients" rows="3" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-dark text-sm" placeholder="Muz, Çilek, Sütlü Çikolata, Fındık"></textarea>
                </div>

                <div class="pt-4 border-t border-gray-100 flex gap-3">
                    <button type="button" onclick="closeProductModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-sm font-medium hover:bg-gray-50 transition">İptal</button>
                    <button type="submit" class="flex-1 py-3 bg-dark text-white rounded-xl text-sm font-medium hover:bg-black transition">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // SUPABASE VERİTABANI BAĞLANTISI
        const SUPABASE_URL = 'https://zgdmnhjlxizkyecdfmuv.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_DSi2MyU5xEIAl9kqwQrTQw_oBRqBsQZ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allProducts = [];
        let selectedCategoryFilter = 'HEPSİ';

        // PANEL GİRİŞ ŞİFRESİ (Burayı dilediğiniz gibi değiştirebilirsiniz)
        const ADMIN_SECRET = 'babywaffle1453'; 

        function checkLogin() {
            const input = document.getElementById('admin-password').value;
            if (input === ADMIN_SECRET) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                feather.replace();
                loadProducts();
            } else {
                const error = document.getElementById('login-error');
                error.classList.remove('hidden');
            }
        }

        // VERİLERİ SUPABASE'DEN ÇEKME
        async function loadProducts() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('products-table').classList.add('hidden');
            
            try {
                const { data, error } = await supabase
                    .from('menu_items')
                    .select('*')
                    .order('category', { ascending: true })
                    .order('name', { ascending: true });

                if (error) throw error;
                allProducts = data;

                renderFilters();
                renderProductsList();
            } catch (err) {
                console.error(err);
                alert('Veritabanından veriler çekilemedi.');
            }
        }

        // KATEGORİ FİLTRELERİNİ OLUŞTURMA
        function renderFilters() {
            const container = document.getElementById('category-filters');
            const categories = ['HEPSİ', 'WAFFLE 👑', 'CUP WAFFLE 🧇', 'TOST 🥪', 'SICAK ☕', 'SOĞUK 🍹'];
            
            // Gerçek emojili hallerini temiz eşleşme için haritalayalım
            container.innerHTML = categories.map(cat => {
                const isSelected = selectedCategoryFilter === cat || (cat.startsWith(selectedCategoryFilter));
                return `<button onclick="filterCategory('${cat}')" class="px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${isSelected ? 'bg-dark text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">${cat}</button>`;
            }).join('');
        }

        function filterCategory(cat) {
            // Emojisiz ana kelimeye göre filtrelemek için basitleştirme
            selectedCategoryFilter = cat;
            renderFilters();
            renderProductsList();
        }

        // ÜRÜNLERİ LİSTELEME
        function renderProductsList() {
            const container = document.getElementById('products-table');
            container.innerHTML = '';

            let filtered = allProducts;
            if (selectedCategoryFilter !== 'HEPSİ') {
                const baseCat = selectedCategoryFilter.split(' ')[0]; // Örn: "WAFFLE"
                filtered = allProducts.filter(p => p.category.includes(baseCat));
            }

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">Bu kategoride henüz ürün bulunmuyor.</div>`;
            }

            filtered.forEach(prod => {
                container.innerHTML += `
                    <div class="bg-white border border-gray-100 p-4 rounded-xl flex items-center justify-between gap-4 shadow-sm hover:shadow transition">
                        <img src="${prod.img || 'https://placehold.co/80x80'}" class="w-14 h-14 object-cover rounded-lg bg-gray-50 flex-shrink-0">
                        <div class="flex-1 min-w-0">
                            <span class="text-[10px] bg-gray-100 px-2 py-0.5 rounded-md text-gray-500 font-bold uppercase">${prod.category}</span>
                            <h4 class="font-bold text-sm text-gray-800 truncate mt-1">${prod.name}</h4>
                            <p class="text-xs text-gray-400 truncate max-w-md">${prod.ingredients ? prod.ingredients.join(', ') : ''}</p>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <div class="font-bold text-dark text-base">${prod.price} ₺</div>
                            <div class="flex gap-1 mt-2">
                                <button onclick="editProduct('${prod.id}')" class="p-1.5 bg-gray-50 text-gray-600 rounded-md hover:bg-dark hover:text-white transition"><i data-feather="edit-2" class="w-3.5 h-3.5"></i></button>
                                <button onclick="deleteProduct('${prod.id}', '${prod.name}')" class="p-1.5 bg-red-50 text-red-600 rounded-md hover:bg-red-600 hover:text-white transition"><i data-feather="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                    </div>`;
            });

            document.getElementById('loading-state').classLif.add('hidden');
            container.classList.remove('hidden');
            feather.replace();
        }

        // MODAL KONTROLLERİ
        function openProductModal() {
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('modal-mode-title').innerText = "Yeni Ürün Ekle";
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        // DÜZENLEME MODUNU AÇMA
        function editProduct(id) {
            const prod = allProducts.find(p => p.id == id);
            if (!prod) return;

            document.getElementById('product-id').value = prod.id;
            document.getElementById('prod-category').value = prod.category;
            document.getElementById('prod-name').value = prod.name;
            document.getElementById('prod-price').value = prod.price;
            document.getElementById('prod-img').value = prod.img || '';
            document.getElementById('prod-ingredients').value = prod.ingredients ? prod.ingredients.join(', ') : '';

            document.getElementById('modal-mode-title').innerText = "Ürünü Düzenle";
            document.getElementById('product-modal').classList.remove('hidden');
        }

        // ÜRÜNÜ KAYDETME (EKLEME VEYA GÜNCELLEME)
        async function saveProduct(e) {
            e.preventDefault();
            
            const id = document.getElementById('product-id').value;
            const category = document.getElementById('prod-category').value;
            const name = document.getElementById('prod-name').value;
            const price = parseInt(document.getElementById('prod-price').value);
            const img = document.getElementById('prod-img').value;
            
            const ingRaw = document.getElementById('prod-ingredients').value;
            // Virgüllerle ayrılmış veriyi diziye (array) çevirip temizliyoruz
            const ingredients = ingRaw ? ingRaw.split(',').map(i => i.trim()).filter(i => i.length > 0) : [];

            const productData = { category, name, price, img, ingredients };

            try {
                if (id) {
                    // Güncelleme modu
                    const { error } = await supabase
                        .from('menu_items')
                        .update(productData)
                        .eq('id', id);
                    if (error) throw error;
                } else {
                    // Yeni ekleme modu
                    const { error } = await supabase
                        .from('menu_items')
                        .insert([productData]);
                    if (error) throw error;
                }

                closeProductModal();
                loadProducts(); // Listeyi yenile
            } catch (err) {
                console.error(err);
                alert('Kayıt sırasında bir hata oluştu.');
            }
        }

        // ÜRÜNÜ SİLME
        async function deleteProduct(id, name) {
            if (confirm(`"${name}" ürününü menüden tamamen silmek istediğinize emin misiniz?`)) {
                try {
                    const { error } = await supabase
                        .from('menu_items')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    loadProducts();
                } catch (err) {
                    console.error(err);
                    alert('Ürün silinemedi.');
                }
            }
        }
    </script>
</body>
</html>
