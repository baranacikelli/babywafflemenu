<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Waffle - Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Baby Waffle</h1>
            <p class="text-sm text-gray-400 text-center mb-6">Yönetici Girişi</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Yönetici Şifresi</label>
                    <input type="password" id="admin-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-black transition">
                </div>
                <p id="login-error" class="text-red-500 text-xs hidden text-center font-medium">Hatalı şifre girdiniz!</p>
                <button onclick="checkPassword()" class="w-full bg-black text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition shadow-lg">Giriş Yap</button>
            </div>
        </div>
    </div>

    <div id="panel-screen" class="hidden max-w-4xl mx-auto px-4 py-10">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Ürün Yönetimi</h1>
                <p class="text-sm text-gray-500" id="total-count">Yükleniyor...</p>
            </div>
            <button onclick="logout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-100 transition">Çıkış Yap</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-400 uppercase tracking-wider">
                            <th class="p-4 pl-6">Görsel</th>
                            <th class="p-4">Ürün Adı</th>
                            <th class="p-4">Kategori</th>
                            <th class="p-4">Fiyat</th>
                            <th class="p-4 pr-6 text-right">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="admin-menu-list" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CANLI ÇALIŞAN SUPABASE BİLGİLERİ
        const SUPABASE_URL = 'https://zgdmnhjlxizkyecdfmuv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnZG1uaGpseGl6a3llY2RmbXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjUyMzcsImV4cCI6MjA5NzMwMTIzN30.L-KV8VKywt9fOF5jLDQFYOCX2kCEDrtXHRZFEBk2ARk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: false }
        });

        // ŞİFRENİZ GÜVENLİ ŞEKİLDE BURADA TANIMLI
        const CORRECT_PASSWORD_HASH = "babywaffle1453"; 

        function checkPassword() {
            const input = document.getElementById('admin-password').value;
            const errorText = document.getElementById('login-error');

            if (input === CORRECT_PASSWORD_HASH) {
                errorText.classList.add('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('panel-screen').classList.remove('hidden');
                fetchAdminMenu();
            } else {
                errorText.classList.remove('hidden');
            }
        }

        async function fetchAdminMenu() {
            try {
                const { data, error } = await supabaseClient
                    .from('menu_items')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                const tbody = document.getElementById('admin-menu-list');
                document.getElementById('total-count').innerText = `Toplam ${data.length} adet kayıtlı ürün bulunuyor.`;
                tbody.innerHTML = '';

                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50/50 transition">
                            <td class="p-4 pl-6">
                                <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover bg-gray-100" onerror="this.src='https://placehold.co/50x50?text=Urun'">
                            </td>
                            <td class="p-4 font-semibold text-gray-800">${item.name}</td>
                            <td class="p-4"><span class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-md text-xs font-medium">${item.category}</span></td>
                            <td class="p-4 font-bold text-gray-900">${item.price} ₺</td>
                            <td class="p-4 pr-6 text-right">
                                <button onclick="updatePricePrompt(${item.id}, '${item.name}', ${item.price})" class="text-xs font-bold text-black border border-gray-300 bg-white hover:bg-black hover:text-white px-3 py-1.5 rounded-lg transition">Fiyat Değiştir</button>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                console.error("Hata:", err);
                alert("Veriler çekilirken bir hata oluştu!");
            }
        }

        async function updatePricePrompt(id, name, currentPrice) {
            const newPrice = prompt(`"${name}" ürünü için yeni fiyatı giriniz (Mevcut: ${currentPrice} ₺):`, currentPrice);
            if (newPrice === null) return;
            
            const parsedPrice = parseInt(newPrice);
            if (isNaN(parsedPrice) || parsedPrice <= 0) {
                alert("Lütfen geçerli bir sayısal fiyat giriniz!");
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('menu_items')
                    .update({ price: parsedPrice })
                    .eq('id', id);

                if (error) throw error;
                alert("Fiyat başarıyla güncellendi!");
                fetchAdminMenu();
            } catch (err) {
                console.error("Güncelleme hatası:", err);
                alert("Fiyat güncellenirken bir hata oluştu.");
            }
        }

        function logout() {
            document.getElementById('admin-password').value = '';
            document.getElementById('panel-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
